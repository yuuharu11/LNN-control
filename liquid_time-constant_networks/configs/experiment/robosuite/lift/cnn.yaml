# @package _global_
defaults:
  - /trainer: default
  - /model: cnn
  - /loader: default
  - /dataset: robomimic_lift_lowdim
  - /task: regression
  - /optimizer: adamw
  - /scheduler: cosine_warmup

train:
  monitor: val/mse
  mode: min

model:
  _name_: cnn
  d_model: 9
  d_output: 6

loader:
  batch_size: 200   

optimizer:
  lr: 1e-4

scheduler:
  num_warmup_steps: 100
  num_training_steps: 1500

decoder:
  _name_: linear

encoder: 
  _name_: linear