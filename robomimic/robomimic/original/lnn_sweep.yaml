program: /work/robomimic/robomimic/original/sweep_lnn.py
method: bayes
project: robomimic_lnn_can_sweeps
metric:
  name: "Rollout/Success_Rate/low_dim_v15"
  goal: maximize
run_cap: 300
parameters:
  units:
    values: [128, 256, 512, 1024]
  seq_length:
    values: [1, 5, 10, 20, 30]
  horizon:
    values: [1, 5, 10, 20, 30]
  ode_unfolds:
    values: [1, 3, 5, 10]
  learning_rate:
    min: 1e-4
    max: 1e-2
    distribution: log_uniform_values
