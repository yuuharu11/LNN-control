# @package _group_
# @package _global_
defaults:
  - /trainer: default
  - /model: default
  - /loader: default
  - /dataset: robomimic_lift_lowdim
  - /task: regression
  - /optimizer: adamw
  - /scheduler: cosine_warmup

train:
  monitor: val/mse
  mode: min

encoder: 
  _name_: linear
  
decoder:
  _name_: linear

model:
  dropout: 0.2
  n_layers: 1
  d_model: 112  
  prenorm: true
  norm: layer

loader:
  batch_size: 256

optimizer:
  lr: 5e-3
  weight_decay: 0.05

scheduler:
  num_training_steps: 1500
  num_warmup_steps: 100

